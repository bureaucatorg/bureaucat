<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0b"/>
      <stop offset="100%" stop-color="#141110"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2623"/>
      <stop offset="100%" stop-color="#0f0d0b"/>
    </linearGradient>
    <radialGradient id="dial" cx="30%" cy="18%" r="90%">
      <stop offset="0%" stop-color="#1c1a17"/>
      <stop offset="100%" stop-color="#0a0908"/>
    </radialGradient>
    <linearGradient id="lug" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2623"/>
      <stop offset="100%" stop-color="#121010"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Amber ambient glow -->
  <circle cx="1050" cy="120" r="340" fill="#F59E0B" fill-opacity="0.09"/>
  <circle cx="280" cy="520" r="220" fill="#F59E0B" fill-opacity="0.06"/>

  <!-- ===== WATCH ASSEMBLY (left, centered around 290,315) ===== -->
  <!-- Center watch around (290, 315). Bezel 400×400, top-left (90, 115) -->

  <!-- Glow behind watch -->
  <rect x="70" y="95" width="440" height="440" rx="80" fill="#F59E0B" fill-opacity="0.10" filter="url(#softGlow)"/>

  <!-- Lugs (top) -->
  <rect x="138" y="99" width="58" height="26" rx="7" fill="url(#lug)" stroke="#2e2a26" stroke-width="1"/>
  <rect x="384" y="99" width="58" height="26" rx="7" fill="url(#lug)" stroke="#2e2a26" stroke-width="1"/>
  <rect x="148" y="109" width="38" height="6" rx="2" fill="#1a1713"/>
  <rect x="394" y="109" width="38" height="6" rx="2" fill="#1a1713"/>

  <!-- Lugs (bottom) -->
  <rect x="138" y="506" width="58" height="26" rx="7" fill="url(#lug)" stroke="#2e2a26" stroke-width="1"/>
  <rect x="384" y="506" width="58" height="26" rx="7" fill="url(#lug)" stroke="#2e2a26" stroke-width="1"/>
  <rect x="148" y="516" width="38" height="6" rx="2" fill="#1a1713"/>
  <rect x="394" y="516" width="38" height="6" rx="2" fill="#1a1713"/>

  <!-- Left engraving plate -->
  <rect x="78" y="267" width="14" height="96" rx="3" fill="url(#lug)" stroke="#2e2a26" stroke-width="1"/>
  <g transform="translate(87 360) rotate(-90)" font-family="ui-monospace, Menlo, monospace" font-size="9" letter-spacing="4" fill="#7a6f61">
    <text>CAT · 20M</text>
  </g>

  <!-- Right crown + pushers -->
  <rect x="490" y="236" width="16" height="26" rx="3" fill="url(#lug)" stroke="#2e2a26" stroke-width="1"/>
  <g>
    <rect x="488" y="288" width="18" height="48" rx="4" fill="#1a1713" stroke="#2e2a26" stroke-width="1"/>
    <g stroke="#3b342e" stroke-width="1">
      <line x1="490" y1="292" x2="506" y2="292"/>
      <line x1="490" y1="298" x2="506" y2="298"/>
      <line x1="490" y1="304" x2="506" y2="304"/>
      <line x1="490" y1="310" x2="506" y2="310"/>
      <line x1="490" y1="316" x2="506" y2="316"/>
      <line x1="490" y1="322" x2="506" y2="322"/>
      <line x1="490" y1="328" x2="506" y2="328"/>
    </g>
  </g>
  <rect x="490" y="362" width="16" height="26" rx="3" fill="url(#lug)" stroke="#2e2a26" stroke-width="1"/>

  <!-- Bezel -->
  <rect x="90" y="115" width="400" height="400" rx="52" fill="url(#bezel)" stroke="#2f2925" stroke-width="1.5"/>

  <!-- Corner screws -->
  <g fill="#16140f" stroke="#2f2925" stroke-width="1">
    <circle cx="120" cy="145" r="6"/>
    <circle cx="460" cy="145" r="6"/>
    <circle cx="120" cy="485" r="6"/>
    <circle cx="460" cy="485" r="6"/>
  </g>
  <g stroke="#5b5349" stroke-width="1" stroke-linecap="round">
    <line x1="116" y1="142" x2="124" y2="148"/>
    <line x1="456" y1="142" x2="464" y2="148"/>
    <line x1="116" y1="482" x2="124" y2="488"/>
    <line x1="456" y1="482" x2="464" y2="488"/>
  </g>

  <!-- Bezel cardinal ticks -->
  <g fill="#6a6157">
    <rect x="289" y="127" width="2" height="10" rx="1"/>
    <rect x="289" y="493" width="2" height="10" rx="1"/>
    <rect x="127" y="304" width="10" height="2" rx="1"/>
    <rect x="473" y="304" width="10" height="2" rx="1"/>
  </g>

  <!-- Secondary bezel ticks -->
  <g fill="#3a342e">
    <rect x="195" y="128" width="1" height="6"/>
    <rect x="384" y="128" width="1" height="6"/>
    <rect x="195" y="496" width="1" height="6"/>
    <rect x="384" y="496" width="1" height="6"/>
    <rect x="127" y="222" width="6" height="1"/>
    <rect x="127" y="388" width="6" height="1"/>
    <rect x="477" y="222" width="6" height="1"/>
    <rect x="477" y="388" width="6" height="1"/>
  </g>

  <!-- Dial -->
  <rect x="120" y="145" width="340" height="340" rx="36" fill="url(#dial)" stroke="#24201d" stroke-width="1"/>

  <!-- Progress outline (58% filled, amber) -->
  <rect x="128" y="153" width="324" height="324" rx="30" fill="none" stroke="#2a2623" stroke-width="2"/>
  <rect x="128" y="153" width="324" height="324" rx="30" fill="none"
        stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"
        pathLength="1" stroke-dasharray="0.60 1"/>

  <!-- Crosshair guides -->
  <line x1="290" y1="228" x2="290" y2="402" stroke="#ffffff" stroke-opacity="0.04"/>
  <line x1="203" y1="315" x2="377" y2="315" stroke="#ffffff" stroke-opacity="0.04"/>

  <!-- Brand -->
  <text x="290" y="193" text-anchor="middle" font-family="ui-monospace, Menlo, monospace"
        font-size="12" font-weight="600" letter-spacing="5" fill="#e8d5b0" opacity="0.75">BUREAUCAT</text>
  <text x="290" y="210" text-anchor="middle" font-family="ui-monospace, Menlo, monospace"
        font-size="8.5" letter-spacing="4" fill="#7a6f61">CHRONO · POMODORO</text>

  <!-- Mode window (top-right) -->
  <rect x="362" y="222" width="58" height="34" rx="5" fill="#050404" stroke="#2e2a26" stroke-width="1"/>
  <text x="391" y="236" text-anchor="middle" font-family="ui-monospace, Menlo, monospace"
        font-size="7" letter-spacing="2.2" fill="#7a6f61">MODE</text>
  <text x="391" y="252" text-anchor="middle" font-family="ui-monospace, Menlo, monospace"
        font-size="13" font-weight="600" letter-spacing="2" fill="#f0e1c3">FOC</text>

  <!-- Status pill (top-left) -->
  <rect x="160" y="228" width="70" height="22" rx="11" fill="#050404" stroke="#2e2a26" stroke-width="1"/>
  <circle cx="174" cy="239" r="3" fill="#F59E0B"/>
  <text x="185" y="243" font-family="ui-monospace, Menlo, monospace"
        font-size="9" letter-spacing="2" fill="#b0a48f">RUN</text>

  <!-- Main time -->
  <text x="290" y="352" text-anchor="middle"
        font-family="ui-monospace, Menlo, monospace"
        font-weight="200" font-size="96" letter-spacing="-2" fill="#fafafa">20:00</text>

  <!-- Left subdial: SESSIONS -->
  <rect x="140" y="398" width="84" height="46" rx="10" fill="#070605" stroke="#2a2623" stroke-width="1"/>
  <text x="182" y="412" text-anchor="middle" font-family="ui-monospace, Menlo, monospace"
        font-size="7" letter-spacing="2.2" fill="#7a6f61">SESSIONS</text>
  <g>
    <circle cx="164" cy="424" r="3.5" fill="#F59E0B"/>
    <circle cx="176" cy="424" r="3.5" fill="#F59E0B"/>
    <circle cx="188" cy="424" r="3.5" fill="#3a342e"/>
    <circle cx="200" cy="424" r="3.5" fill="#3a342e"/>
  </g>
  <text x="182" y="440" text-anchor="middle" font-family="ui-monospace, Menlo, monospace"
        font-size="9" fill="#b0a48f">2/4</text>

  <!-- Right subdial: ELAPSED -->
  <rect x="356" y="398" width="84" height="46" rx="10" fill="#070605" stroke="#2a2623" stroke-width="1"/>
  <text x="398" y="412" text-anchor="middle" font-family="ui-monospace, Menlo, monospace"
        font-size="7" letter-spacing="2.2" fill="#7a6f61">ELAPSED</text>
  <rect x="366" y="420" width="64" height="5" rx="2.5" fill="#2a2623"/>
  <rect x="366" y="420" width="38" height="5" rx="2.5" fill="#F59E0B"/>
  <text x="398" y="440" text-anchor="middle" font-family="ui-monospace, Menlo, monospace"
        font-size="9" fill="#b0a48f">60%</text>

  <!-- Bottom engraving -->
  <text x="290" y="470" text-anchor="middle" font-family="ui-monospace, Menlo, monospace"
        font-size="9" letter-spacing="4" fill="#7a6f61">20:00 · FOCUS</text>

  <!-- ===== RIGHT SIDE CONTENT ===== -->

  <!-- Top brand: B badge + Bureaucat -->
  <g>
    <rect x="582" y="130" width="48" height="48" rx="11" fill="#FAFAFA"/>
    <text x="606" y="155" font-family="ui-monospace, Menlo, monospace"
          font-size="28" font-weight="700" fill="#09090B"
          text-anchor="middle" dominant-baseline="central">B</text>
    <text x="648" y="155" font-family="system-ui, -apple-system, sans-serif"
          font-size="34" font-weight="600" fill="#fafafa"
          dominant-baseline="central">Bureaucat</text>
  </g>

  <!-- Amber accent -->
  <rect x="582" y="224" width="44" height="3" rx="1.5" fill="#F59E0B"/>

  <!-- Tagline -->
  <text x="582" y="300" font-family="system-ui, -apple-system, sans-serif"
        font-size="42" font-weight="500" fill="#fafafa" letter-spacing="-0.5">Red tape</text>
  <text x="582" y="354" font-family="system-ui, -apple-system, sans-serif"
        font-size="42" font-weight="500" fill="#fafafa" letter-spacing="-0.5">
    <tspan>for your </tspan><tspan fill="#F59E0B" font-style="italic">attention.</tspan>
  </text>

  <!-- Bottom-right: link icon + bureaucat.org -->
  <g transform="translate(892 546) scale(1.3)" stroke="#F59E0B" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
  </g>
  <text x="938" y="572" font-family="system-ui, -apple-system, sans-serif"
        font-size="26" font-weight="500" fill="#e4e4e8">bureaucat.org</text>
</svg>
