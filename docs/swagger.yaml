  handlers.AddAssigneeRequest:
    properties:
      user_id:
        type: string
    type: object
  handlers.AddLabelRequest:
    properties:
      label_id:
        type: string
    type: object
  handlers.AddMemberRequest:
    properties:
      role:
        type: string
      user_id:
        type: string
