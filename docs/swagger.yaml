basePath: /api/v1
definitions:
  handlers.ActivityLogResponse:
    properties:
      activity_type:
        type: string
      actor_id:
        type: string
      created_at:
        type: string
      field_name:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      new_value: {}
      old_value: {}
      task_id:
        type: string
      username:
        type: string
