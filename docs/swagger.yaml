      message:
        type: string
    type: object
  handlers.CommentResponse:
    properties:
      content:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      task_id:
        type: string
      updated_at:
        type: string
      username:
        type: string
      version:
        type: integer
    type: object
  handlers.CreateCommentRequest:
    properties:
      content:
        type: string
    type: object
  handlers.CreateLabelRequest:
    properties:
      color:
        type: string
      name:
        type: string
    type: object
  handlers.CreateProjectRequest:
    properties:
      cover_id:
        type: string
      description:
        type: string
      icon_id:
        type: string
      name:
        type: string
      project_key:
        type: string
    type: object
  handlers.CreateStateRequest:
    properties:
      color:
        type: string
      name:
        type: string
      position:
        type: integer
      state_type:
        type: string
    type: object
  handlers.CreateTaskRequest:
    properties:
      assignees:
        items:
          type: string
        type: array
      description:
        type: string
      labels:
        items:
          type: string
        type: array
      priority:
        type: integer
      state_id:
        type: string
      title:
        type: string
    type: object
  handlers.CreateTemplateRequest:
    properties:
      description:
        type: string
      name:
        type: string
      title:
        type: string
    type: object
  handlers.CreateUserRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        type: string
      user_type:
        type: string
      username:
        type: string
    type: object
  handlers.ErrorResponse:
    properties:
      message:
        type: string
    type: object
  handlers.LabelResponse:
    properties:
      color:
        type: string
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  handlers.MemberResponse:
    properties:
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      joined_at:
        type: string
      last_name:
        type: string
      role:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
  handlers.MessageResponse:
    properties:
      message:
        type: string
    type: object
  handlers.PaginatedProjectsResponse:
    properties:
      page:
        type: integer
      per_page:
        type: integer
      projects:
        items:
          $ref: '#/definitions/handlers.ProjectResponse'
        type: array
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  handlers.PaginatedTasksResponse:
    properties:
      page:
        type: integer
      per_page:
        type: integer
      tasks:
        items:
          $ref: '#/definitions/handlers.TaskResponse'
        type: array
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  handlers.PaginatedTokensResponse:
    properties:
      page:
        type: integer
      per_page:
        type: integer
      tokens:
        items:
          $ref: '#/definitions/handlers.TokenInfo'
        type: array
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  handlers.PaginatedUsersResponse:
    properties:
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
      users:
        items:
          $ref: '#/definitions/handlers.UserResponse'
        type: array
    type: object
  handlers.ProjectResponse:
    properties:
      cover_url:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      description:
        type: string
      icon_url:
        type: string
      id:
        type: string
      name:
        type: string
      project_key:
        type: string
      role:
        type: string
      updated_at:
        type: string
    type: object
  handlers.ResetUserPasswordRequest:
    properties:
      password:
        type: string
    type: object
  handlers.SSOProviderConfig:
    properties:
      client_id:
        type: string
      client_secret:
        type: string
      enabled:
        type: boolean
      issuer_url:
        description: Zitadel only
        type: string
      redirect_uri:
        type: string
    type: object
  handlers.SSOProvidersPublicResponse:
    properties:
      google:
        type: boolean
      zitadel:
        type: boolean
    type: object
  handlers.SSOSettings:
    properties:
      google:
        $ref: '#/definitions/handlers.SSOProviderConfig'
      zitadel:
        $ref: '#/definitions/handlers.SSOProviderConfig'
    type: object
  handlers.SigninRequest:
    properties:
      identifier:
        description: email or username
        type: string
      password:
        type: string
    type: object
  handlers.SignupRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  handlers.StateResponse:
    properties:
      color:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_default:
        type: boolean
      name:
        type: string
      position:
        type: integer
      state_type:
        type: string
    type: object
  handlers.TaskLabelInfo:
    properties:
      color:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  handlers.TaskResponse:
    properties:
      assignees:
        items:
          $ref: '#/definitions/handlers.AssigneeResponse'
        type: array
      created_at:
        type: string
      created_by:
        type: string
      creator_first_name:
        type: string
      creator_last_name:
        type: string
      creator_username:
        type: string
      description:
        type: string
      id:
        type: string
      labels:
        items:
          $ref: '#/definitions/handlers.TaskLabelInfo'
        type: array
      priority:
        type: integer
      project_key:
        type: string
      state_color:
        type: string
      state_id:
        type: string
      state_name:
        type: string
      state_type:
        type: string
      task_id:
        description: e.g., "DEVOP-123"
        type: string
      task_number:
        type: integer
      title:
        type: string
      updated_at:
        type: string
    type: object
  handlers.TemplateResponse:
    properties:
      created_at:
        type: string
      created_by:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  handlers.TokenInfo:
    properties:
      created_at:
        type: string
      email:
        type: string
      expires_at:
        type: string
      id:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
  handlers.UpdateBrandingRequest:
    properties:
      app_name:
        type: string
      enabled:
        type: boolean
    type: object
  handlers.UpdateCommentRequest:
    properties:
      content:
        type: string
    type: object
  handlers.UpdateLabelRequest:
    properties:
      color:
        type: string
      name:
        type: string
    type: object
  handlers.UpdateMemberRequest:
    properties:
      role:
        type: string
    type: object
  handlers.UpdateProjectRequest:
    properties:
      cover_id:
        type: string
      description:
        type: string
      icon_id:
        type: string
      name:
        type: string
    type: object
  handlers.UpdateStateRequest:
    properties:
      color:
        type: string
      name:
        type: string
      position:
        type: integer
    type: object
  handlers.UpdateTaskRequest:
    properties:
      description:
        type: string
      priority:
        type: integer
      state_id:
        type: string
      title:
        type: string
    type: object
  handlers.UpdateTemplateRequest:
    properties:
      description:
        type: string
      name:
        type: string
      title:
        type: string
    type: object
  handlers.UpdateUserRoleRequest:
    properties:
      user_type:
        type: string
    type: object
  handlers.UploadResponse:
    properties:
      filename:
        type: string
      id:
        type: string
      mime_type:
        type: string
      size_bytes:
        type: integer
      url:
        type: string
    type: object
  handlers.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      user_type:
        type: string
      username:
        type: string
    type: object
  handlers.VerifyActivityResponse:
    properties:
      message:
        type: string
      valid:
        type: boolean
    type: object
host: localhost:1341
info:
  contact: {}
  description: Bureaucat - Approval workflow application API
  title: Bureaucat API
  version: "1.0"
paths:
  /admin/import/plane:
    post:
      consumes:
      - multipart/form-data
      description: Upload and import a Plane.so SQL dump file. Max 500MB. Requires
        admin role.
      parameters:
      - description: SQL dump file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Import from Plane.so
      tags:
      - Admin - Import
  /admin/settings/branding:
    put:
      consumes:
      - application/json
      description: Update branding settings. Requires admin role.
      parameters:
      - description: Branding settings
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateBrandingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.BrandingResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update branding
      tags:
      - Admin - Settings
  /admin/settings/sso:
    get:
      description: Returns full SSO configuration with secrets masked. Requires admin
        role.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.SSOSettings'
      security:
      - BearerAuth: []
      summary: Get SSO settings
      tags:
      - Admin - Settings
    put:
      consumes:
      - application/json
      description: Update SSO provider configuration. Masked secrets are preserved.
        Requires admin role.
      parameters:
      - description: SSO configuration
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.SSOSettings'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.SSOSettings'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update SSO settings
      tags:
      - Admin - Settings
  /admin/tokens:
    get:
      description: Returns a paginated list of active refresh tokens with user info.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.PaginatedTokensResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List active tokens
      tags:
      - Admin - Tokens
  /admin/tokens/{id}:
    delete:
      description: Revoke a specific refresh token by ID.
      parameters:
      - description: Token ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Revoke token
      tags:
      - Admin - Tokens
  /admin/tokens/expired:
    delete:
      description: Hard-delete all expired refresh tokens from the database.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.CleanupResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Cleanup expired tokens
      tags:
      - Admin - Tokens
  /admin/users:
    get:
      consumes:
      - application/json
      description: Returns a paginated list of all users. Supports search by username,
        email, or name.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: per_page
        type: integer
      - description: Search by username, email, or name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.PaginatedUsersResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List users
      tags:
      - Admin - Users
    post:
      consumes:
      - application/json
      description: Create a new user account with the specified details.
      parameters:
      - description: User details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create user
      tags:
      - Admin - Users
  /admin/users/{id}:
    delete:
      description: Delete a user by their ID. Cannot delete yourself.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete user
      tags:
      - Admin - Users
  /admin/users/{id}/password:
    put:
      consumes:
      - application/json
      description: Reset a user's password and revoke all their active sessions.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: New password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.ResetUserPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Reset user password
      tags:
      - Admin - Users
  /admin/users/{id}/role:
    put:
      consumes:
      - application/json
      description: Change a user's role between admin and user. Cannot demote yourself.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: New role
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateUserRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update user role
      tags:
      - Admin - Users
  /auth/sso/{provider}:
    get:
      description: Initiates the OAuth2/OIDC flow. Redirects to the identity provider.
      parameters:
      - description: SSO provider (google or zitadel)
        in: path
        name: provider
        required: true
        type: string
      responses:
        "307":
          description: Temporary Redirect
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Start SSO
      tags:
      - SSO
  /auth/sso/{provider}/callback:
    get:
      description: Handles the OAuth2/OIDC callback. Redirects to frontend with auth
        status.
      parameters:
      - description: SSO provider (google or zitadel)
        in: path
        name: provider
        required: true
        type: string
      - description: Authorization code
        in: query
        name: code
        type: string
      - description: OAuth state
        in: query
        name: state
        type: string
      responses:
        "307":
          description: Temporary Redirect
      summary: SSO callback
      tags:
      - SSO
  /logout:
    post:
      description: Revoke all refresh tokens for the current user and clear cookies.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
      summary: Logout
      tags:
      - Auth
  /me:
    get:
      description: Returns the authenticated user's profile information.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - Auth
  /og-image:
    get:
      description: Generates a dynamic PNG Open Graph image with the app's branding.
      produces:
      - image/png
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Generate OG image
      tags:
      - Misc
  /projects:
    get:
      description: Returns a paginated list of projects. Admins see all projects;
        others see only their memberships.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: per_page
        type: integer
      - description: Search by name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.PaginatedProjectsResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List projects
      tags:
      - Projects
    post:
      consumes:
      - application/json
      description: Create a new project with default workflow states. Creator is added
        as admin.
      parameters:
      - description: Project details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateProjectRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.ProjectResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create project
      tags:
      - Projects
  /projects/{projectKey}:
    delete:
      description: Soft-delete a project. Requires project admin role.
      parameters:
      - description: Project key
        in: path
        name: projectKey
        required: true
        type: string
      produces:
